name: Release GameMaker Package
description: "Build a .yymps from a GameMaker project, attach it to the release, and fill in commits and closed issues."
author: Tinkerer_Red

branding:
  icon: package
  color: purple

inputs:
  # ----- packaging (required) ---------------------------------------------
  project-file:
    description: "Path to the source .yyp inside the consumer repo."
    required: true
  package-id:
    description: "Internal package id - drives the output filename and the package's .yyp basename."
    required: true

  # ----- packaging (optional) ---------------------------------------------
  package-name:
    description: "Display name shown in the IDE's package importer. Defaults to package-id."
    required: false
    default: ""
  package-publisher:
    description: "Publisher name shown next to the package in the IDE."
    required: false
    default: ""
  include-folders:
    description: >-
      Comma-separated resource-tree folder names to include. Sub-folders are
      picked up automatically. Examples: "MyLibrary", "MyLibrary/Core",
      "MyLibrary/Core,MyLibrary/Extras". The "folders/" prefix and ".yy"
      suffix are stripped if present.
    required: true
  append-version-to-filename:
    description: 'When "true", filename is "<package-id>-<version>.yymps".'
    required: false
    default: "true"

  # ----- release notes ----------------------------------------------------
  auto-generate-description:
    description: >-
      When "true", generate a templated release body. When "false", do not
      touch the release body at all.
    required: false
    default: "true"
  include-issues-in-description:
    description: >-
      When "true" (and auto-generate-description is "true"), append an
      "Issues Closed" section listing issues closed by closing-keyword
      references (close/fix/resolve + #N) in commits since the previous tag.
    required: false
    default: "true"
  include-commits-in-description:
    description: >-
      When "true" (and auto-generate-description is "true"), append a
      "Commits" section listing every commit since the previous tag.
    required: false
    default: "true"

  # ----- tooling ----------------------------------------------------------
  project-tool-version:
    description: "Pinned version of @gm-tools/project-tool from the GMPM registry."
    required: false
    default: "2024.14.160"
  gmpm-registry:
    description: "GMPM registry URL."
    required: false
    default: "https://gmpm.gamemaker.io"

outputs:
  filename:
    description: "Filename of the produced .yymps."
    value: ${{ steps.ver.outputs.filename }}
  version:
    description: "Normalized 3-part version stamped into the package."
    value: ${{ steps.ver.outputs.version }}
  raw-version:
    description: "Version exactly as the user tagged it (post-v-strip, pre-pad)."
    value: ${{ steps.ver.outputs.raw_version }}

runs:
  using: composite
  steps:
    # Cache the project-tool install across runs - the package contains
    # binaries and is the slowest step on a cold run.
    - name: Cache project-tool
      id: cache_tool
      uses: actions/cache@v5
      with:
        path: .gm-tools
        key: project-tool-linux-x64-${{ inputs.project-tool-version }}

    - name: Install project-tool
      if: steps.cache_tool.outputs.cache-hit != 'true'
      shell: bash
      env:
        GMPM_REGISTRY: ${{ inputs.gmpm-registry }}
        PROJECT_TOOL_VERSION: ${{ inputs.project-tool-version }}
      run: |
        mkdir -p .gm-tools
        npm install \
          --prefix .gm-tools \
          --registry "${GMPM_REGISTRY}" \
          "@gm-tools/project-tool-linux-x64@${PROJECT_TOOL_VERSION}"

    # Locate the executable. The npm package layout is not officially
    # documented, so we discover it instead of hard-coding the path.
    - name: Locate project-tool binary
      id: locate
      shell: bash
      run: |
        _binary=$(find .gm-tools/node_modules/@gm-tools -maxdepth 4 -type f -perm -u+x | head -n 1)
        if [ -z "${_binary}" ]; then
          echo "could not find project-tool binary - listing package contents:"
          find .gm-tools/node_modules/@gm-tools -maxdepth 4 -type f -ls
          exit 1
        fi
        echo "Found: ${_binary}"
        echo "binary=${_binary}" >> "${GITHUB_OUTPUT}"

    - name: Determine version
      id: ver
      shell: bash
      env:
        APPEND_VERSION_TO_FILENAME: ${{ inputs.append-version-to-filename }}
        PACKAGE_ID: ${{ inputs.package-id }}
      run: |
        if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
          echo "this action only runs on tag pushes (got ref type: ${GITHUB_REF_TYPE})"
          exit 1
        fi
        _rawVersion="${GITHUB_REF_NAME#v}"
        if ! printf '%s' "${_rawVersion}" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
          echo "version '${_rawVersion}' is not in expected format (N.N or N.N.N, optionally v-prefixed)"
          exit 1
        fi
        # pad 2-part to 3-part for the package's internal PACKAGEVERSION
        case "${_rawVersion}" in
          *.*.*) _version="${_rawVersion}" ;;
          *)     _version="${_rawVersion}.0" ;;
        esac

        if [ "${APPEND_VERSION_TO_FILENAME}" = "true" ]; then
          _filename="${PACKAGE_ID}-${_rawVersion}.yymps"
        else
          _filename="${PACKAGE_ID}.yymps"
        fi

        echo "version=${_version}" >> "${GITHUB_OUTPUT}"
        echo "raw_version=${_rawVersion}" >> "${GITHUB_OUTPUT}"
        echo "filename=${_filename}" >> "${GITHUB_OUTPUT}"
        echo "Building ${PACKAGE_ID} ${_version} -> ${_filename}"

    # The IDE's "Create Local Package" action passes INCLUDERESOURCES with
    # an explicit list of resource names, not INCLUDEFOLDERS. Replicate that
    # by walking the .yyp and expanding the requested folder(s) into a
    # comma-separated resource list.
    - name: Expand folders to resource list
      id: expand
      shell: bash
      env:
        PROJECT_FILE: ${{ inputs.project-file }}
        INCLUDE_FOLDERS: ${{ inputs.include-folders }}
      run: |
        cat > /tmp/expand-folders.mjs <<'NODE_EOF'
        import * as fs from "node:fs";
        import * as path from "node:path";

        const _projectFile = process.argv[2];
        const _folderInput = process.argv[3];
        const _projectDir = path.dirname(_projectFile);

        function parseRelaxed(_text) {
        	let _str = _text;
        	if (_str.charCodeAt(0) === 0xFEFF) {
        		_str = _str.slice(1);
        	}
        	return JSON.parse(_str.replace(/,(\s*[\]}])/g, "$1"));
        }

        const _project = parseRelaxed(fs.readFileSync(_projectFile, "utf8"));
        const _folderList = _folderInput.split(",").map(function (_folder) {
        	return _folder.trim().replace(/^folders\//, "").replace(/\.yy$/, "");
        }).filter(function (_folder) {
        	return _folder.length > 0;
        });

        const _resourceNames = [];
        for (const _resource of (_project.resources || [])) {
        	const _yyPath = path.join(_projectDir, _resource.id.path);
        	if (!fs.existsSync(_yyPath)) {
        		continue;
        	}
        	const _yy = parseRelaxed(fs.readFileSync(_yyPath, "utf8"));
        	const _parentPath = ((_yy.parent && _yy.parent.path) || "").replace(/\\/g, "/");

        	let _matched = false;
        	for (const _folder of _folderList) {
        		const _matchExact = "folders/" + _folder + ".yy";
        		const _matchPrefix = "folders/" + _folder + "/";
        		if (_parentPath === _matchExact || _parentPath.startsWith(_matchPrefix)) {
        			_matched = true;
        			break;
        		}
        	}
        	if (_matched) {
        		_resourceNames.push(_resource.id.name);
        	}
        }

        if (_resourceNames.length === 0) {
        	process.stderr.write("no resources found in folders: " + _folderInput + "\n");
        	process.exit(1);
        }

        process.stdout.write(_resourceNames.join(","));
        NODE_EOF

        _resourceList=$(node /tmp/expand-folders.mjs "${PROJECT_FILE}" "${INCLUDE_FOLDERS}")
        echo "Resources to include: ${_resourceList}"
        echo "resources=${_resourceList}" >> "${GITHUB_OUTPUT}"

    # project-tool refuses to load a .yyp that references prefab packages
    # which aren't installed on the machine running it. The GameMaker IDE
    # ships prefabs at a system path; CI runners don't have them. Strip
    # `ForcedPrefabProjectReferences` from the runner's working copy of the
    # .yyp so the load step succeeds. The runner's checkout is ephemeral,
    # so source files in the consumer repo are not affected. Library
    # packages don't carry forward host-project prefab dependencies anyway.
    - name: Strip prefab references from project
      shell: bash
      env:
        PROJECT_FILE: ${{ inputs.project-file }}
      run: |
        if grep -q '"ForcedPrefabProjectReferences"' "${PROJECT_FILE}"; then
          perl -i -0pe 's/"ForcedPrefabProjectReferences":\s*\[[^\]]*\]/"ForcedPrefabProjectReferences":[]/g' "${PROJECT_FILE}"
          echo "Stripped ForcedPrefabProjectReferences from ${PROJECT_FILE}"
        else
          echo "No ForcedPrefabProjectReferences in ${PROJECT_FILE} - skipping"
        fi

    - name: Build yymps
      shell: bash
      env:
        BINARY: ${{ steps.locate.outputs.binary }}
        PROJECT_FILE: ${{ inputs.project-file }}
        FILENAME: ${{ steps.ver.outputs.filename }}
        PACKAGE_ID: ${{ inputs.package-id }}
        PACKAGE_NAME_INPUT: ${{ inputs.package-name }}
        PACKAGE_VERSION: ${{ steps.ver.outputs.version }}
        PACKAGE_PUBLISHER: ${{ inputs.package-publisher }}
        RESOURCES: ${{ steps.expand.outputs.resources }}
      run: |
        # default package-name to package-id if blank
        _displayName="${PACKAGE_NAME_INPUT:-${PACKAGE_ID}}"
        "${BINARY}" EXPORT \
          "SOURCE=${PWD}/${PROJECT_FILE}" \
          "DESTINATION=${PWD}/${FILENAME}" \
          "PACKAGETYPE=Package" \
          "PACKAGEID=${PACKAGE_ID}" \
          "PACKAGENAME=${_displayName}" \
          "PACKAGEVERSION=${PACKAGE_VERSION}" \
          "PUBLISHERNAME=${PACKAGE_PUBLISHER}" \
          "INCLUDERESOURCES=${RESOURCES}" \
          "READONLY=TRUE"

    # Sanity-check the output is a valid zip with the four required
    # metadata files - cheap and catches silent failures.
    - name: Verify yymps structure
      shell: bash
      env:
        FILENAME: ${{ steps.ver.outputs.filename }}
        PACKAGE_ID: ${{ inputs.package-id }}
      run: |
        if [ ! -f "${FILENAME}" ]; then
          echo "expected output missing: ${FILENAME}"
          exit 1
        fi
        unzip -l "${FILENAME}"
        for _required in metadata.json yymanifest.xml "${PACKAGE_ID}.yyp" "${PACKAGE_ID}.resource_order"; do
          if ! unzip -l "${FILENAME}" | grep -q " ${_required}\$"; then
            echo "missing required file inside yymps: ${_required}"
            exit 1
          fi
        done

    # Build the release-notes body. Only runs if auto-generate-description
    # is "true"; the section toggles control which sub-sections appear.
    - name: Generate release notes
      if: inputs.auto-generate-description == 'true'
      id: notes
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RAW_VERSION: ${{ steps.ver.outputs.raw_version }}
        INCLUDE_ISSUES: ${{ inputs.include-issues-in-description }}
        INCLUDE_COMMITS: ${{ inputs.include-commits-in-description }}
      run: |
        _newline=$'\n'

        _currentTag="${GITHUB_REF_NAME}"
        _previousTag=$(git describe --tags --abbrev=0 "${_currentTag}^" 2>/dev/null || true)

        if [ -n "${_previousTag}" ]; then
          _range="${_previousTag}..${_currentTag}"
          echo "Comparing ${_previousTag}..${_currentTag}"
        else
          _range="${_currentTag}"
          echo "First release - including all commits up to ${_currentTag}"
        fi

        _extras=""

        if [ "${INCLUDE_ISSUES}" = "true" ]; then
          # Standard GitHub closing keywords:
          #   close/closes/closed, fix/fixes/fixed, resolve/resolves/resolved
          _issueNumbers=$(git log "${_range}" --pretty=%B 2>/dev/null \
            | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -nu \
            || true)

          _issueLines=""
          for _num in ${_issueNumbers}; do
            _title=$(gh issue view "${_num}" --json title --jq .title 2>/dev/null || true)
            if [ -n "${_title}" ]; then
              _issueLines="${_issueLines}- ${_title} #${_num}${_newline}"
            fi
          done
          if [ -z "${_issueLines}" ]; then
            _issueLines="_(none)_"
          fi
          _issueLines="${_issueLines%${_newline}}"
          _extras="${_extras}### Issues Closed:${_newline}${_issueLines}${_newline}${_newline}"
        fi

        if [ "${INCLUDE_COMMITS}" = "true" ]; then
          _commits=$(git log "${_range}" --pretty=format:"- %s %h" 2>/dev/null || true)
          if [ -z "${_commits}" ]; then
            _commits="_(none)_"
          fi
          _extras="${_extras}### Commits:${_newline}${_commits}"
        fi

        # Header is always present when auto-gen is on. Blank lines are the
        # description placeholder area for the user to fill in.
        _body="# Release ${RAW_VERSION}:${_newline}${_newline}${_newline}${_newline}"

        if [ -n "${_extras}" ]; then
          _body="${_body}---${_newline}${_newline}${_extras}"
        fi

        {
          printf '%s\n' "body<<__BODY_END_a8f3c2__"
          printf '%s\n' "${_body}"
          printf '%s\n' "__BODY_END_a8f3c2__"
        } >> "${GITHUB_OUTPUT}"

    # Single release update: attaches yymps and (conditionally) sets body.
    # Done in one call so there are no concurrent writes to the release.
    - name: Create release with yymps and notes
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.ver.outputs.filename }}
        body: ${{ steps.notes.outputs.body }}
        # Preserve any release notes the user typed in the GitHub UI - their
        # text stays at the top, our template appends below it.
        append_body: true
        fail_on_unmatched_files: true
