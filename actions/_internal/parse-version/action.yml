name: Parse version
description: >-
  Internal helper. Validates the current ref is a tag matching the accepted
  format (1.0, v1.0, 1.2.3, v1.2.3), normalizes it to a 3-part version for
  package metadata, and exposes both the raw and normalized forms.
  Not intended for direct use - prefer the public actions in this repo.
author: Tinkerer_Red

outputs:
  version:
    description: "Normalized 3-part version (1.0 -> 1.0.0, 1.2.3 stays 1.2.3)."
    value: ${{ steps.parse.outputs.version }}
  raw_version:
    description: "Version exactly as the user tagged it (post-v-strip, pre-pad)."
    value: ${{ steps.parse.outputs.raw_version }}

runs:
  using: composite
  steps:
    - name: Parse and normalize version
      id: parse
      shell: bash
      run: |
        if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
          echo "this action only runs on tag pushes (got ref type: ${GITHUB_REF_TYPE})"
          exit 1
        fi
        _rawVersion="${GITHUB_REF_NAME#v}"
        if ! printf '%s' "${_rawVersion}" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
          echo "version '${_rawVersion}' is not in expected format (N.N or N.N.N, optionally v-prefixed)"
          exit 1
        fi
        case "${_rawVersion}" in
          *.*.*) _version="${_rawVersion}" ;;
          *)     _version="${_rawVersion}.0" ;;
        esac

        echo "version=${_version}" >> "${GITHUB_OUTPUT}"
        echo "raw_version=${_rawVersion}" >> "${GITHUB_OUTPUT}"
        echo "Parsed ${GITHUB_REF_NAME} -> raw=${_rawVersion} normalized=${_version}"
