name: Release Notes

on:
  push:
    tags:
      - "[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*"

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  # Appends: "# Release X.Y.Z:" + description placeholder + "---"
  notes-header:
    runs-on: ubuntu-latest
    steps:
      - uses: tinkerer-red/GML-Actions/actions/release-notes/header@v2

  # Appends: "### Issues Closed:" section
  # Remove this job if you don't want closed issues listed.
  notes-issues:
    needs: notes-header
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tinkerer-red/GML-Actions/actions/release-notes/issues@v2

  # Appends: "### Commits:" section
  # Remove this job if you don't want commits listed.
  notes-commits:
    needs: notes-issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tinkerer-red/GML-Actions/actions/release-notes/commits@v2
